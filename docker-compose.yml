services:
  web:
    build: .
    image: ghcr.io/karadyaur/kara3d:latest
    container_name: kara3d-web
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  proxy:
    external: true
