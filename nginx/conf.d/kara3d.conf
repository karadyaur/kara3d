upstream nextjs {
    server web:3000;
    keepalive 64;
}

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name kara3d.de www.kara3d.de;

    if ($not_cloudflare) { return 403; }

    return 301 https://kara3d.de$request_uri;
}

# ─── www → apex redirect ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name www.kara3d.de;

    ssl_certificate     /etc/ssl/kara3d/fullchain.pem;
    ssl_certificate_key /etc/ssl/kara3d/privkey.pem;

    if ($not_cloudflare) { return 403; }

    return 301 https://kara3d.de$request_uri;
}

# ─── Main HTTPS ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name kara3d.de;

    # Cloudflare Origin Certificate (valid 15 years, trusted by CF Full Strict)
    ssl_certificate     /etc/ssl/kara3d/fullchain.pem;
    ssl_certificate_key /etc/ssl/kara3d/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # Block non-Cloudflare traffic from reaching origin directly
    if ($not_cloudflare) { return 403; }

    # Security headers (Cloudflare also sets some, but belt-and-suspenders)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"      always;

    # Next.js static assets — immutable, 1 year
    location /_next/static/ {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js image optimisation
    location /_next/image {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, max-age=86400";
    }

    # Everything else → Next.js
    location / {
        proxy_pass             http://nextjs;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        "upgrade";
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_cache_bypass     $http_upgrade;
        proxy_read_timeout     60s;
        proxy_send_timeout     60s;
    }
}
